<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroid Shooter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #cdd6e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    .hud-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .hud-label { font-size: 10px; letter-spacing: 1.5px; color: #5a6a80; text-transform: uppercase; }
    .hud-value { font-size: 26px; font-weight: 700; color: #4fc3f7; }
    #lives-display { display: flex; gap: 8px; align-items: center; }
    .life-icon {
      width: 16px; height: 16px;
      clip-path: polygon(50% 0%, 0% 100%, 50% 80%, 100% 100%);
      background: #4fc3f7;
    }
    .life-icon.lost { background: #1a2a40; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0, 0, 12, 0.85);
      backdrop-filter: blur(6px);
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 30px #4fc3f7;
      margin-bottom: 8px;
    }
    #overlay .subtitle {
      font-size: 14px;
      color: #5a6a80;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }
    #overlay .final-score {
      font-size: 20px;
      color: #4fc3f7;
      margin-bottom: 28px;
      display: none;
    }
    #overlay button {
      background: #4fc3f7;
      border: none;
      color: #000;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 6px;
      cursor: pointer;
      transition: filter 0.2s;
    }
    #overlay button:hover { filter: brightness(1.15); }

    #controls-hint {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #2a3a50;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    #level-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 20px #4fc3f7;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #level-banner.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="hud">
    <div class="hud-block">
      <div class="hud-value" id="score-val">0</div>
      <div class="hud-label">Score</div>
    </div>
    <div class="hud-block">
      <div class="hud-value" id="level-val">1</div>
      <div class="hud-label">Level</div>
    </div>
    <div class="hud-block">
      <div id="lives-display"></div>
      <div class="hud-label">Lives</div>
    </div>
  </div>

  <div id="overlay">
    <h1 id="overlay-title">ASTEROID<br>SHOOTER</h1>
    <div class="subtitle" id="overlay-sub">Three.js Space Game</div>
    <div class="final-score" id="final-score-label"></div>
    <button id="start-btn">START GAME</button>
  </div>

  <div id="level-banner">LEVEL <span id="level-num">1</span></div>

  <div id="controls-hint">
    ← → ROTATE &nbsp;|&nbsp; ↑ THRUST &nbsp;|&nbsp; SPACE SHOOT &nbsp;|&nbsp; W A S D も使用可
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
